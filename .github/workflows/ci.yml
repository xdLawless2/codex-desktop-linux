name: Source Checks

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "24"
          cache: npm

      - name: Install validation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y appstream shellcheck

      - name: Install npm dependencies
        run: npm ci --include=dev

      - name: Audit npm dependencies
        run: npm audit --audit-level=high

      - name: Validate shell and Node scripts
        run: |
          bash -n scripts/*.sh scripts/internal/*.sh scripts/debian/postinst scripts/debian/postrm
          shellcheck scripts/*.sh scripts/internal/*.sh scripts/debian/postinst scripts/debian/postrm
          node --check build/after-pack.js
          node --check build/linux-ui-patch.js
          appstreamcli validate --no-net assets/metainfo/io.openai.codex.desktop.metainfo.xml

      - name: Validate GitHub Actions workflows
        run: go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.12

      - name: Validate Rust helper
        working-directory: native/sky-wayland
        run: |
          cargo fmt --check
          cargo clippy --all-targets --all-features --locked -- -D warnings
          cargo test --all-targets --all-features --locked
          cargo build --locked --bins

      - name: Verify Computer Use MCP protocol
        run: |
          python3 - <<'PY'
          import json
          import subprocess

          expected = {
              "list_apps",
              "get_app_state",
              "click",
              "drag",
              "scroll",
              "press_key",
              "type_text",
              "set_value",
              "select_text",
              "perform_secondary_action",
          }
          requests = [
              {
                  "jsonrpc": "2.0",
                  "id": 1,
                  "method": "initialize",
                  "params": {
                      "protocolVersion": "2025-06-18",
                      "capabilities": {},
                      "clientInfo": {"name": "ci", "version": "1"},
                  },
              },
              {"jsonrpc": "2.0", "method": "notifications/initialized", "params": {}},
              {"jsonrpc": "2.0", "id": 2, "method": "tools/list", "params": {}},
          ]
          result = subprocess.run(
              ["native/sky-wayland/target/debug/sky_mcp"],
              input="".join(json.dumps(request) + "\n" for request in requests),
              text=True,
              capture_output=True,
              check=True,
              timeout=10,
          )
          responses = [json.loads(line) for line in result.stdout.splitlines()]
          assert responses[0]["result"]["serverInfo"]["name"] == "codex-computer-use-linux"
          assert {tool["name"] for tool in responses[1]["result"]["tools"]} == expected
          PY
